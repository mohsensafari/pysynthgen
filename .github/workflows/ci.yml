name: CI

on:
  push:
    branches-ignore: [main] # main is covered by the release workflow's quality gate
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src/pysynthgen benchmarks/bench_sinks.py

      - name: Test
        run: pytest -q

  pr-title:
    # Ensure the PR title is a valid Conventional Commit, since squash-merge uses it
    # as the commit message that drives the release version bump.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
