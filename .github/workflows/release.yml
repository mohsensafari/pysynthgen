name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release commit + tag + GitHub Release
      id-token: write # PyPI Trusted Publishing (OIDC)
    environment:
      name: pypi
      url: https://pypi.org/p/pysynthgen
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so semantic-release can analyze commits
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Quality gate
        run: |
          uv pip install --system -e ".[dev]"
          ruff check .
          mypy src/pysynthgen benchmarks/bench_sinks.py
          pytest -q

      - name: Semantic version, tag, changelog, GitHub Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
